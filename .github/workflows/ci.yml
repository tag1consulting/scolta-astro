name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22-only: the package's own engines floor is >=20 (astro 4/5
        # consumers), but the test gate's mount suite runs the astro devDep,
        # whose engines require node >=22.12.0 — astro 6 refuses node 20.
        node: [22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # npm ci's lock validation differs across npm versions (npm 10 vs 11,
      # and even within 11: optional peers, platform-package fan-out). Pin
      # the exact npm that generated the lockfiles so the validator always
      # matches the generator; bump both together, deliberately.
      - run: npm install -g npm@11.17.0
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:publish
      # Regression guard: assert `npm pack` ships nothing outside the allowlist
      # derived from package.json's `files` field, and stays under the size cap.
      # Runs after build so dist/ exists for the pack dry-run.
      - run: npm run check:pack
