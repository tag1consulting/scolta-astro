name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22-only: the package's own engines floor is >=20 (astro 4/5
        # consumers), but the test gate's mount suite runs the astro devDep,
        # whose engines require node >=22.12.0 — astro 6 refuses node 20.
        node: [22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:publish
